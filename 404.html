<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Miss Vee Perfume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Open Sans', 'Helvetica Neue', Arial, sans-serif;
      background: #FDF8F0;
      color: #2D3A2D;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 500px; }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 6rem;
      font-weight: 400;
      color: #E8E0D5;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: #2D3A2D;
      margin-bottom: 1rem;
    }
    p {
      color: #6B9B8A;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: #E87A4A;
      margin: 1.5rem auto;
    }
    a {
      display: inline-block;
      background: #E87A4A;
      color: #fff;
      padding: 0.9rem 2.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.2s;
    }
    a:hover { background: #D46A3A; }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <div class="divider"></div>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back to our sanctuary.</p>
    <a href="index.html">Return Home</a>
  </div>
<script>
  if (location.hash) history.replaceState(null, '', location.pathname + location.search);
</script>
</body>
</html>
